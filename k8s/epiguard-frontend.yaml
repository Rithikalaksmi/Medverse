apiVersion: apps/v1
kind: Deployment
metadata:
  name: epiguard-frontend
  labels:
    app: epiguard-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: epiguard-frontend
  template:
    metadata:
      labels:
        app: epiguard-frontend
    spec:
      containers:
      - name: frontend
        image: epiguard-frontend:latest # Note: Should be replaced by CI/CD with actual tag
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: epiguard-frontend-service
spec:
  selector:
    app: epiguard-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer # Exposes the frontend externally
