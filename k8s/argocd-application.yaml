apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: epiguard-fullstack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-username/epiguard-fullstack.git' # UPDATE THIS
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
